name: Publish to pub.dev

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    runs-on: ubuntu-latest
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y git ca-certificates curl xz-utils jq
      - name: Clone repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --branch "${GITHUB_REF_NAME}" --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> "${GITHUB_PATH}"
      - name: Verify toolchain
        run: |
          flutter --version
          dart --version
      - name: Install dependencies
        working-directory: repo
        run: |
          # Remove stale iOS Pods that can break symlink resolution in CI
          find . -path "*/ios/Pods" -type d -prune -exec rm -rf {} +
          find . -path "*/ios/Podfile.lock" -type f -exec rm -f {} +
          flutter pub get
      - name: Verify tag matches pubspec version
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(awk -F': ' '/^version: /{print $2; exit}' pubspec.yaml)"
          echo "Tag: ${tag}"
          echo "pubspec.yaml version: ${version}"
          if [[ "${tag}" != "${version}" ]]; then
            echo "ERROR: Tag (${tag}) does not match pubspec.yaml version (${version})."
            exit 1
          fi
      - name: Verify OIDC availability
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "ERROR: GitHub OIDC variables are missing. Trusted publishing cannot work in this run."
            exit 1
          fi
          echo "OIDC variables are present."
      - name: Configure pub.dev trusted publishing token
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://pub.dev")"
          oidc_token="$(echo "${response}" | jq -r '.value')"
          if [[ -z "${oidc_token}" || "${oidc_token}" == "null" ]]; then
            echo "ERROR: Could not obtain OIDC token for pub.dev."
            echo "${response}"
            exit 1
          fi
          printf '%s' "${oidc_token}" | dart pub token add https://pub.dev
      - name: Publish
        working-directory: repo
        run: flutter pub publish --force

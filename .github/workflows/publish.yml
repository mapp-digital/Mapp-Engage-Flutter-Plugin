name: Publish to pub.dev

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable
    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y git ca-certificates
      - name: Clone repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --branch "${GITHUB_REF_NAME}" --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
      - name: Install dependencies
        working-directory: repo
        run: |
          # Remove stale iOS Pods that can break symlink resolution in CI
          find . -path "*/ios/Pods" -type d -prune -exec rm -rf {} +
          find . -path "*/ios/Podfile.lock" -type f -exec rm -f {} +
          flutter pub get
      - name: Verify tag matches pubspec version
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(awk -F': ' '/^version: /{print $2; exit}' pubspec.yaml)"
          echo "Tag: ${tag}"
          echo "pubspec.yaml version: ${version}"
          if [[ "${tag}" != "${version}" ]]; then
            echo "ERROR: Tag (${tag}) does not match pubspec.yaml version (${version})."
            exit 1
          fi
      - name: Publish
        working-directory: repo
        run: flutter pub publish --force
